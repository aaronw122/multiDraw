<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      @font-face {
        font-family: 'Virgil';
        src: url('./Virgil.woff2') format('woff2');
      }
    </style>
  </defs>

  <rect width="1200" height="630" fill="#ffffff"/>

  <!-- Green blobs top-left -->
  <ellipse cx="80" cy="120" rx="90" ry="130" fill="#a8e6a3" opacity="0.5"/>
  <ellipse cx="140" cy="80" rx="60" ry="80" fill="#7dd87a" opacity="0.4"/>
  <ellipse cx="50" cy="200" rx="40" ry="50" fill="#b8f0b4" opacity="0.35"/>

  <!-- Light blue blob top-right -->
  <circle cx="1080" cy="100" r="55" fill="#d4eeff" opacity="0.5"/>
  <circle cx="1140" cy="160" r="30" fill="#e0f3ff" opacity="0.4"/>

  <!-- Yellow/orange swoosh bottom-right -->
  <path d="M1050,520 Q1100,480 1150,500 Q1200,520 1180,560 Q1160,600 1100,610 Q1050,600 1020,570" fill="#f5c842" opacity="0.5"/>
  <path d="M1080,540 Q1130,510 1170,530 Q1200,550 1190,580 Q1170,610 1120,615" fill="#f0b030" opacity="0.35"/>

  <!-- Pink circle outlines -->
  <circle cx="990" cy="80" r="6" fill="none" stroke="#e8a0a0" stroke-width="1.5" opacity="0.6"/>
  <circle cx="1010" cy="95" r="4" fill="none" stroke="#d4a0b0" stroke-width="1.2" opacity="0.5"/>
  <circle cx="120" cy="400" r="5" fill="none" stroke="#b0c8e8" stroke-width="1.5" opacity="0.5"/>

  <!-- Heart -->
  <path d="M780,130 C780,125 775,118 768,118 C760,118 755,125 755,130 C755,125 750,118 742,118 C735,118 730,125 730,130 C730,142 755,155 755,155 C755,155 780,142 780,130Z" fill="none" stroke="#e06060" stroke-width="1.8" opacity="0.6"/>

  <!-- Orange triangle -->
  <path d="M175,340 L185,318 L195,340Z" fill="#e8943a" opacity="0.5"/>

  <!-- Yellow crosshatch square -->
  <rect x="140" y="270" width="18" height="18" fill="none" stroke="#d4b040" stroke-width="1.5" opacity="0.5" transform="rotate(15, 149, 279)"/>
  <line x1="142" y1="273" x2="156" y2="285" stroke="#d4b040" stroke-width="1" opacity="0.4"/>
  <line x1="148" y1="270" x2="158" y2="280" stroke="#d4b040" stroke-width="1" opacity="0.4"/>

  <!-- Purple diamond top-right -->
  <rect x="1090" y="130" width="14" height="14" fill="#6965db" opacity="0.5" transform="rotate(45, 1097, 137)"/>

  <!-- Bar chart right side -->
  <rect x="1000" y="350" width="22" height="70" fill="none" stroke="#d4807a" stroke-width="2" opacity="0.5" transform="rotate(-8, 1011, 385)"/>
  <rect x="1030" y="330" width="22" height="90" fill="none" stroke="#d4807a" stroke-width="2" opacity="0.5" transform="rotate(-8, 1041, 375)"/>
  <rect x="1060" y="310" width="22" height="110" fill="none" stroke="#d4807a" stroke-width="2" opacity="0.5" transform="rotate(-8, 1071, 365)"/>
  <line x1="1005" y1="355" x2="1018" y2="415" stroke="#d4807a" stroke-width="1" opacity="0.35"/>
  <line x1="1010" y1="355" x2="1023" y2="415" stroke="#d4807a" stroke-width="1" opacity="0.35"/>
  <line x1="1035" y1="335" x2="1048" y2="415" stroke="#d4807a" stroke-width="1" opacity="0.35"/>
  <line x1="1040" y1="335" x2="1053" y2="415" stroke="#d4807a" stroke-width="1" opacity="0.35"/>
  <line x1="1065" y1="315" x2="1078" y2="415" stroke="#d4807a" stroke-width="1" opacity="0.35"/>
  <line x1="1070" y1="315" x2="1083" y2="415" stroke="#d4807a" stroke-width="1" opacity="0.35"/>

  <!-- Green diamond -->
  <rect x="970" y="460" width="12" height="12" fill="#5cb85c" opacity="0.5" transform="rotate(45, 976, 466)"/>

  <!-- Purple dashed line bottom-left -->
  <path d="M280,480 Q250,500 230,520 Q210,540 220,560" fill="none" stroke="#6965db" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <circle cx="220" cy="565" r="8" fill="none" stroke="#6965db" stroke-width="2" opacity="0.5"/>

  <!-- MULTIDRAW -->
  <text x="600" y="295" text-anchor="middle" font-family="Virgil, 'Comic Sans MS', cursive" font-size="72" font-weight="bold" fill="#343a6e" letter-spacing="8">MULTIDRAW</text>

  <!-- Tagline -->
  <text x="600" y="380" text-anchor="middle" font-family="Virgil, 'Comic Sans MS', cursive" font-size="36" fill="#7a8399" letter-spacing="1">Excalidraw with multiple projects</text>

  <!-- Circle around "multiple" -->
  <ellipse cx="668" cy="372" rx="80" ry="28" fill="none" stroke="#e06060" stroke-width="2" opacity="0.6" transform="rotate(-2, 668, 372)"/>
</svg>
